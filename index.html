<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Reader</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1a1a1a;
        }

        #container {
            max-width: 650px;
            width: 100%;
        }

        #controls {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        button {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }

        button:disabled {
            background: #ccc;
        }

        #output {
            font-size: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 200px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #1a1a1a;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="container">
    <div id="controls">
        <input type="password" id="apiKey" placeholder="Enter Anthropic API Key">
        <input type="text" id="userInput" placeholder="Ask anything..." value="Write a short poem about the ocean.">
        <button id="sendBtn">Send Message</button>
    </div>

    <div id="output"></div>
</div>

<script>
    const sendBtn = document.getElementById('sendBtn');
    const output = document.getElementById('output');
    const apiKeyInput = document.getElementById('apiKey');
    const userInput = document.getElementById('userInput');

    sendBtn.addEventListener('click', async () => {
        const key = apiKeyInput.value.trim();
        const prompt = userInput.value.trim();

        if (!key) return alert('Please enter an API key');
        
        // Reset UI
        output.innerHTML = '';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        output.appendChild(cursor);
        
        sendBtn.disabled = true;

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'dangerously-allow-browser': 'true' // Required for client-side demo
                },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20240620", // Note: Using current stable model name
                    max_tokens: 1024,
                    messages: [{ role: "user", content: prompt }],
                    stream: true
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || 'API Request Failed');
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                
                // Process buffer line by line
                const lines = buffer.split('\n');
                buffer = lines.pop(); // Keep partial line in buffer

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed.startsWith('data: ')) continue;
                    
                    try {
                        const data = JSON.parse(trimmed.slice(6));
                        
                        if (data.type === 'content_block_delta') {
                            const text = data.delta.text;
                            // Insert text before the cursor
                            cursor.insertAdjacentText('beforebegin', text);
                            // Auto-scroll
                            window.scrollTo(0, document.body.scrollHeight);
                        }
                        
                        if (data.type === 'message_stop') {
                            cursor.remove();
                        }
                    } catch (e) {
                        console.error("Error parsing SSE line", e);
                    }
                }
            }
        } catch (error) {
            output.innerHTML = `<span style="color: red">Error: ${error.message}</span>`;
        } finally {
            sendBtn.disabled = false;
        }
    });
</script>

</body>
</html>
